name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    name: Verify production build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://kanban:ci-password@127.0.0.1:5432/team_kanban?schema=public
      APP_URL: http://localhost:3000
      SESSION_SECRET: ci-only-session-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to production
    if: github.event_name != 'pull_request'
    needs: verify
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          install -m 600 .github/known_hosts ~/.ssh/known_hosts

      - name: Package release
        run: |
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.next' \
            --exclude='node_modules' \
            --exclude='uploads' \
            --exclude='.ui-audit' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='*.log' \
            -czf "$RUNNER_TEMP/team-kanban-${GITHUB_SHA}.tgz" .

      - name: Upload release
        run: |
          scp "$RUNNER_TEMP/team-kanban-${GITHUB_SHA}.tgz" \
            root@31.207.7.46:"/tmp/team-kanban-${GITHUB_SHA}.tgz"

      - name: Deploy application
        env:
          RELEASE_SHA: ${{ github.sha }}
        run: |
          ssh root@31.207.7.46 \
            "RELEASE_SHA='${RELEASE_SHA}' ARCHIVE_PATH='/tmp/team-kanban-${RELEASE_SHA}.tgz' bash -s" \
            < .github/scripts/deploy-production.sh
